<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main id="playing-cards">
    <div class="card">
      <div class="left">
        <h2>A</h2>
        <p class="spade">♠</p>
      </div>
      <div class="middle"></div>
      <div class="right"></div>
    </div>

    
    <div class="card">
      <div class="middle">
        <h2 style="color: red">1</h2>
        <p class="clover">♣</p>
      </div>
      <div class="left"></div>
      <div class="right"></div>
    </div>

    <div class="card">
      <div class="right">
        <h2 style="color: red">2</h2>
        <p class="heart">♥</p>
      </div>
      <div class="left"></div>
      <div class="middle"></div>
    </div>
  </main>

</body>

</html>
